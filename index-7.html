<style>
/* ============ DESIGN TOKENS ============ */
:root{
  --bg:#0a0e27;
  --surface:#1a1f3a;
  --card:#252d4d;
  --card-glass:rgba(37,45,77,0.6);
  --text:#ffffff;
  --text-2:#b0b5c4;
  --accent:#00d9ff;
  --accent-2:#ff006e;
  --accent-3:#ffd60a;
  --success:#2ecc71;
  --error:#e74c3c;
  --warning:#f39c12;
  --border:rgba(255,255,255,0.1);
  --r-card:14px;
  --r-btn:10px;
  --r-input:8px;
  --r-chip:16px;
  --shadow-card:0 4px 12px rgba(0,0,0,0.15);
  --shadow-elevated:0 8px 24px rgba(0,0,0,0.2);
  --shadow-hover:0 12px 32px rgba(0,0,0,0.3);
  --ease:cubic-bezier(0.4,0,0.2,1);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --header-h:56px;
  --nav-h:60px;
}
[data-theme="light"]{
  --bg:#f4f6fb;
  --surface:#ffffff;
  --card:#ffffff;
  --card-glass:rgba(255,255,255,0.75);
  --text:#12162c;
  --text-2:#5a6178;
  --border:rgba(10,14,39,0.1);
  --shadow-card:0 4px 12px rgba(20,25,60,0.08);
  --shadow-elevated:0 8px 24px rgba(20,25,60,0.1);
  --shadow-hover:0 12px 32px rgba(20,25,60,0.14);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{-webkit-text-size-adjust:100%;}
body{
  background:var(--bg);color:var(--text);
  font-family:'Inter',sans-serif;font-size:15px;line-height:1.55;
  overflow-x:hidden;min-height:100vh;
  transition:background .25s var(--ease),color .25s var(--ease);
}
h1,h2,h3,.font-display{font-family:'Space Grotesk',sans-serif;font-weight:700;line-height:1.25;letter-spacing:-0.01em;}
.mono{font-family:'JetBrains Mono',monospace;}
button{font-family:inherit;border:none;background:none;color:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;color:inherit;}
a{color:inherit;text-decoration:none;}
img{max-width:100%;display:block;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
.visually-hidden{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px;}

/* ============ APP SHELL ============ */
#app{min-height:100vh;display:flex;flex-direction:column;}
.status-fill{height:var(--safe-top);background:var(--bg);width:100%;}
.app-header{
  position:sticky;top:0;z-index:40;
  height:var(--header-h);padding-top:0;
  display:flex;align-items:center;justify-content:space-between;
  padding-left:16px;padding-right:16px;
  background:color-mix(in srgb, var(--bg) 85%, transparent);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
}
.app-header .brand{display:flex;align-items:center;gap:8px;font-family:'Space Grotesk';font-weight:800;font-size:17px;letter-spacing:-0.02em;}
.app-header .brand .dot{width:9px;height:9px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-2));box-shadow:0 0 12px var(--accent);}
.brand.logo-press{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;-webkit-user-select:none;}
.app-logo-img{width:26px;height:26px;border-radius:7px;object-fit:cover;flex-shrink:0;box-shadow:0 0 10px rgba(0,217,255,0.35);}
.header-icons{display:flex;align-items:center;gap:14px;}
.icon-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:18px;transition:transform .15s var(--ease),background .15s;position:relative;}
.icon-btn:active{transform:scale(0.9);background:var(--card);}
.badge-dot{position:absolute;top:4px;right:4px;width:8px;height:8px;border-radius:50%;background:var(--accent-2);border:2px solid var(--bg);}
.header-search{flex:1;display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:var(--r-input);padding:8px 12px;margin:0 10px;}
.header-search input{background:none;border:none;outline:none;color:var(--text);font-size:14px;width:100%;}

.screen{padding:16px;padding-bottom:calc(var(--nav-h) + var(--safe-bottom) + 24px);max-width:1400px;margin:0 auto;width:100%;animation:fadeSlideIn .28s var(--ease);}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.screen-title{font-size:24px;margin-bottom:4px;}
.screen-sub{color:var(--text-2);font-size:13px;margin-bottom:16px;}

/* ============ BOTTOM NAV (mobile) ============ */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:50;height:calc(var(--nav-h) + var(--safe-bottom));
  padding-bottom:var(--safe-bottom);
  background:color-mix(in srgb, var(--surface) 92%, transparent);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-top:1px solid var(--border);
  display:flex;align-items:stretch;justify-content:space-around;
}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:10px;color:var(--text-2);transition:color .15s,transform .15s;position:relative;}
.nav-item .ic{font-size:21px;transition:transform .15s var(--ease);}
.nav-item.active{color:var(--accent);}
.nav-item.active .ic{transform:translateY(-2px);}
.nav-item:active .ic{transform:scale(0.85);}
.nav-item.active::before{content:'';position:absolute;top:-1px;width:22px;height:2px;background:var(--accent);border-radius:2px;box-shadow:0 0 8px var(--accent);}

/* ============ DESKTOP TOP NAV ============ */
.top-nav{display:none;}
@media (min-width:768px){
  :root{--header-h:64px;}
  .bottom-nav{display:none;}
  .top-nav{
    display:flex;align-items:center;justify-content:space-between;
    position:sticky;top:0;z-index:50;height:64px;padding:0 28px;
    background:color-mix(in srgb, var(--bg) 88%, transparent);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border-bottom:1px solid var(--border);
  }
  .top-nav .brand{font-size:19px;}
  .top-nav .links{display:flex;gap:28px;align-items:center;}
  .top-nav .links a{font-size:14px;font-weight:500;color:var(--text-2);padding:8px 2px;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;}
  .top-nav .links a.active,.top-nav .links a:hover{color:var(--text);border-color:var(--accent);}
  .app-header{display:none;}
  .screen{padding:28px 24px;padding-bottom:40px;}
}

/* ============ CARDS / COMPONENTS ============ */
.card{background:var(--card-glass);border:1px solid var(--border);border-radius:var(--r-card);box-shadow:var(--shadow-card);backdrop-filter:blur(8px);}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 18px;border-radius:var(--r-btn);font-weight:600;font-size:14px;transition:transform .1s var(--ease),box-shadow .15s,background .15s;}
.btn:active{transform:scale(0.95);}
.btn-primary{background:linear-gradient(135deg,var(--accent),#00b8d9);color:#00131a;box-shadow:0 4px 16px rgba(0,217,255,0.25);}
.btn-primary:hover{box-shadow:0 6px 22px rgba(0,217,255,0.4);}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);}
.btn-ghost{background:var(--card);color:var(--text);}
.btn-danger{background:rgba(231,76,60,0.15);color:var(--error);border:1px solid rgba(231,76,60,0.35);}
.btn-block{width:100%;}
.btn-sm{padding:8px 12px;font-size:12.5px;}
.chip{display:inline-flex;align-items:center;padding:7px 14px;border-radius:var(--r-chip);font-size:12.5px;font-weight:500;background:var(--card);border:1px solid var(--border);color:var(--text-2);white-space:nowrap;transition:all .15s var(--ease);}
.chip.active{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;border-color:transparent;}
.chip-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;}
.chip-row::-webkit-scrollbar{display:none;}

.hscroll{display:flex;gap:12px;overflow-x:auto;padding-bottom:6px;scroll-snap-type:x proximity;scrollbar-width:none;}
.hscroll::-webkit-scrollbar{display:none;}
.hscroll>*{scroll-snap-align:start;}

.section{margin-bottom:28px;}
.section-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px;}
.section-head h2{font-size:18px;}
.section-head .see-all{font-size:12.5px;color:var(--accent);font-weight:600;}

/* Product Card */
.product-card{background:var(--card-glass);border:1px solid var(--border);border-radius:var(--r-card);overflow:hidden;position:relative;box-shadow:var(--shadow-card);transition:transform .18s var(--ease),box-shadow .18s var(--ease);cursor:pointer;}
.product-card:hover{transform:translateY(-2px) scale(1.01);box-shadow:var(--shadow-hover);}
.product-card .thumb-wrap{position:relative;aspect-ratio:1/1;background:var(--surface);overflow:hidden;}
.product-card .thumb-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .3s var(--ease);}
.product-card:hover .thumb-wrap img{transform:scale(1.06);}
.product-card .price-badge{position:absolute;top:8px;right:8px;background:rgba(10,14,39,0.75);color:var(--accent-3);font-weight:700;font-size:12px;padding:4px 9px;border-radius:var(--r-chip);backdrop-filter:blur(4px);}
.product-card .wish-btn{position:absolute;bottom:8px;right:8px;width:32px;height:32px;border-radius:50%;background:rgba(10,14,39,0.65);display:flex;align-items:center;justify-content:center;font-size:15px;backdrop-filter:blur(4px);transition:transform .12s var(--ease);}
.product-card .wish-btn.active{color:var(--accent-2);}
.product-card .wish-btn:active{transform:scale(0.8);}
.product-card .info{padding:10px 12px 12px;}
.product-card .name{font-size:13.5px;font-weight:600;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:34px;margin-bottom:4px;}
.product-card .meta-row{display:flex;align-items:center;justify-content:space-between;}
.product-card .rating{font-size:11.5px;color:var(--accent-3);}
.product-card .old-price{font-size:11px;color:var(--text-2);text-decoration:line-through;}

.grid-products{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
@media (min-width:600px){.grid-products{grid-template-columns:repeat(3,1fr);gap:16px;}}
@media (min-width:1024px){.grid-products{grid-template-columns:repeat(4,1fr);gap:20px;}}
.card-sm{width:150px;flex:none;}
@media (min-width:768px){.card-sm{width:190px;}}

/* Hero */
.hero{position:relative;border-radius:18px;overflow:hidden;padding:26px 20px;margin-bottom:22px;min-height:190px;display:flex;flex-direction:column;justify-content:flex-end;background:linear-gradient(135deg,#0f1638,#1c1440);}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 80% 15%,rgba(0,217,255,0.35),transparent 55%),radial-gradient(circle at 15% 85%,rgba(255,0,110,0.28),transparent 55%);}
.hero .htag{position:relative;font-size:11.5px;font-weight:700;letter-spacing:.08em;color:var(--accent-3);text-transform:uppercase;margin-bottom:8px;}
.hero h1{position:relative;font-size:26px;max-width:340px;margin-bottom:8px;}
.hero p{position:relative;color:var(--text-2);font-size:13.5px;max-width:320px;margin-bottom:16px;}
.hero .btn{position:relative;width:fit-content;}
@media (min-width:768px){.hero{min-height:260px;padding:40px;}.hero h1{font-size:36px;max-width:480px;}.hero p{font-size:15px;max-width:420px;}}

/* Skeleton */
.skel{background:linear-gradient(90deg,var(--card) 25%,var(--surface) 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:var(--r-card);}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
.skel-card{aspect-ratio:0.72;}

/* Empty state */
.empty-state{display:flex;flex-direction:column;align-items:center;text-align:center;padding:60px 20px;color:var(--text-2);}
.empty-state .ic{font-size:44px;margin-bottom:14px;}
.empty-state h3{color:var(--text);margin-bottom:6px;font-size:16px;}
.empty-state p{font-size:13px;margin-bottom:18px;max-width:260px;}

/* Toast */
#toast-stack{position:fixed;bottom:calc(var(--nav-h) + var(--safe-bottom) + 16px);left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:8px;z-index:200;pointer-events:none;}
@media (min-width:768px){#toast-stack{bottom:24px;}}
.toast{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px 18px;border-radius:var(--r-chip);font-size:13px;box-shadow:var(--shadow-elevated);animation:toastIn .25s var(--ease);display:flex;align-items:center;gap:8px;}
.toast.success{border-color:rgba(46,204,113,0.4);}
.toast.error{border-color:rgba(231,76,60,0.4);}
@keyframes toastIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

/* Filter bar */
.filter-bar{position:sticky;top:var(--header-h);z-index:30;background:var(--bg);padding:10px 0;margin:-4px 0 14px;display:flex;flex-direction:column;gap:10px;}
.filter-row{display:flex;gap:8px;align-items:center;}
.select-pill{background:var(--card);border:1px solid var(--border);border-radius:var(--r-chip);padding:7px 12px;font-size:12.5px;color:var(--text);}

/* Product detail */
.pd-media{position:relative;border-radius:16px;overflow:hidden;aspect-ratio:1/1;background:var(--surface);margin-bottom:12px;}
.pd-media img,.pd-media video{width:100%;height:100%;object-fit:cover;}
.pd-thumb{position:relative;flex:none;width:64px;height:64px;border-radius:10px;overflow:hidden;background:var(--surface);cursor:pointer;border:1px solid var(--border);}
.pd-thumb img,.pd-thumb video{width:100%;height:100%;object-fit:cover;}
.pd-thumb-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;background:rgba(0,0,0,0.3);}
.pd-price{font-size:26px;font-weight:800;color:var(--accent-3);font-family:'Space Grotesk';}
.pd-old{font-size:14px;color:var(--text-2);text-decoration:line-through;margin-left:8px;}
.stars{color:var(--accent-3);letter-spacing:1px;font-size:13px;}
.detail-block{padding:16px 0;border-top:1px solid var(--border);}
.detail-block h3{font-size:15px;margin-bottom:8px;}
.spec-row{display:flex;justify-content:space-between;padding:7px 0;font-size:13px;border-bottom:1px dashed var(--border);color:var(--text-2);}
.spec-row span:last-child{color:var(--text);}
.review-card{display:flex;gap:10px;padding:12px 0;border-bottom:1px solid var(--border);}
.avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;flex-shrink:0;}
.sticky-buy{position:fixed;left:0;right:0;bottom:calc(var(--nav-h) + var(--safe-bottom));z-index:45;padding:10px 16px;background:color-mix(in srgb, var(--bg) 90%, transparent);backdrop-filter:blur(10px);border-top:1px solid var(--border);display:flex;gap:10px;align-items:center;}
@media (min-width:768px){.sticky-buy{position:static;background:none;border:none;backdrop-filter:none;padding:16px 0 0;}}

/* Service screen */
.service-card{display:flex;gap:14px;padding:16px;margin-bottom:12px;align-items:flex-start;}
.service-card .sic{font-size:26px;background:var(--surface);width:50px;height:50px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.steps-grid{display:grid;grid-template-columns:1fr;gap:12px;}
@media (min-width:600px){.steps-grid{grid-template-columns:repeat(4,1fr);}}
.step-card{padding:16px;text-align:center;}
.step-num{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;margin:0 auto 10px;}
.faq-item{border-bottom:1px solid var(--border);padding:14px 0;}
.faq-q{display:flex;justify-content:space-between;align-items:center;font-weight:600;font-size:14px;cursor:pointer;}
.faq-a{max-height:0;overflow:hidden;transition:max-height .25s var(--ease);color:var(--text-2);font-size:13.5px;}
.faq-item.open .faq-a{max-height:300px;padding-top:10px;}
.faq-item.open .faq-q .chev{transform:rotate(180deg);}
.faq-q .chev{transition:transform .2s var(--ease);}

/* Profile / Menu */
.list-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);}
.list-row:last-child{border-bottom:none;}
.list-row .left{display:flex;align-items:center;gap:12px;font-size:14px;}
.list-row .left .ic{font-size:18px;width:22px;text-align:center;}
.switch{width:42px;height:24px;border-radius:14px;background:var(--card);position:relative;transition:background .2s;flex-shrink:0;}
.switch.on{background:var(--accent);}
.switch .knob{position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .2s var(--ease);box-shadow:0 1px 4px rgba(0,0,0,0.3);}
.switch.on .knob{transform:translateX(18px);}
.profile-avatar-lg{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:#fff;}

/* Menu screen socials */
.social-row .ic{font-size:20px;display:inline-flex;align-items:center;justify-content:center;}

/* ============ ADMIN ============ */
.admin-overlay{position:fixed;inset:0;background:var(--bg);z-index:500;overflow-y:auto;font-family:'Inter',sans-serif;}
.admin-login{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;padding:20px;}
.admin-login input{width:260px;max-width:80vw;padding:12px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:15px;text-align:center;letter-spacing:2px;}
.admin-shell{display:flex;min-height:100vh;}
.admin-side{width:210px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:16px 10px;position:sticky;top:0;height:100vh;overflow-y:auto;}
.admin-side .atab{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;font-size:13px;color:var(--text-2);margin-bottom:2px;}
.admin-side .atab.active{background:var(--card);color:var(--accent);font-weight:600;}
.admin-main{flex:1;padding:24px;max-width:1100px;}
.admin-main h2{font-size:20px;margin-bottom:16px;}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:20px;}
.stat-box{padding:16px;border-radius:12px;background:var(--surface);border:1px solid var(--border);}
.stat-box .num{font-size:24px;font-weight:800;font-family:'Space Grotesk';}
.stat-box .lbl{font-size:11.5px;color:var(--text-2);}
.admin-table{width:100%;border-collapse:collapse;font-size:13px;}
.admin-table th{text-align:left;padding:10px;color:var(--text-2);font-weight:600;border-bottom:1px solid var(--border);font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;}
.admin-table td{padding:10px;border-bottom:1px solid var(--border);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media (max-width:640px){.form-grid{grid-template-columns:1fr;}}
.form-field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.form-field label{font-size:12px;color:var(--text-2);font-weight:600;}
.form-field input,.form-field select,.form-field textarea{padding:9px 11px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13.5px;}
.form-field textarea{resize:vertical;min-height:70px;}
.admin-topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
.mobile-admin-tabs{display:none;}
@media (max-width:768px){
  .admin-side{display:none;}
  .mobile-admin-tabs{display:flex;overflow-x:auto;gap:6px;padding:10px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:5;}
  .mobile-admin-tabs .atab{white-space:nowrap;background:var(--surface);}
  .admin-main{padding:16px;}
}
.log-row{font-size:12.5px;color:var(--text-2);padding:8px 0;border-bottom:1px dashed var(--border);}

/* ============ NOVA AI CHAT ============ */
.nova-fab{position:fixed;right:16px;bottom:calc(var(--nav-h) + var(--safe-bottom) + 16px);width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 6px 20px rgba(0,217,255,0.4);z-index:400;animation:novaFloat 3s ease-in-out infinite;transition:transform .15s var(--ease),width .15s var(--ease),border-radius .15s var(--ease);color:#00131a;gap:8px;}
.nova-fab:active{transform:scale(0.9);}
@keyframes novaFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
@media (min-width:768px){
  .nova-fab{bottom:24px;right:24px;width:auto;padding:0 20px 0 16px;border-radius:28px;font-size:20px;font-weight:700;}

}
.nova-fab .fab-label{display:none;}
.nova-panel{position:fixed;right:0;bottom:0;left:0;top:auto;height:82vh;background:var(--surface);border-radius:20px 20px 0 0;z-index:410;display:flex;flex-direction:column;box-shadow:0 -10px 40px rgba(0,0,0,0.4);transform:translateY(100%);transition:transform .3s var(--ease);border-top:1px solid var(--border);}
.nova-panel.open{transform:translateY(0);}

.msg.user{align-self:flex-end;background:linear-gradient(135deg,var(--accent),#00b8d9);color:#00131a;border-bottom-right-radius:4px;}
.msg.ai{align-self:flex-start;background:var(--card);border-bottom-left-radius:4px;}
.msg.ai a{color:var(--accent);text-decoration:underline;}

const LS_KEYS = {

function lsGet(key, fallback){
  try{ const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch(e){ return fallback; }
}
function lsSet(key, val){
  try{ localStorage.setItem(key, JSON.stringify(val)); }catch(e){ console.warn('Storage failed', e); }
}

function seedIfNeeded(){
  if(!lsGet(LS_KEYS.seeded, false)){
    lsSet(LS_KEYS.products, DEFAULT_PRODUCTS);
    lsSet(LS_KEYS.categories, DEFAULT_CATEGORIES);
    lsSet(LS_KEYS.testimonials, DEFAULT_TESTIMONIALS);
    lsSet(LS_KEYS.faqs, DEFAULT_FAQS);
    lsSet(LS_KEYS.content, DEFAULT_CONTENT);
    lsSet(LS_KEYS.wishlist, []);
    lsSet(LS_KEYS.feed, DEFAULT_FEED_POSTS);
    lsSet(LS_KEYS.services, DEFAULT_SERVICES);
    lsSet(LS_KEYS.seeded, true);
    logActivity('System', 'App initialized with demo catalog');
  } else {
    // Migration for installs seeded by an older version of this file: fill in
    // any newly-added fields/collections without touching existing admin edits.
    const c = lsGet(LS_KEYS.content, DEFAULT_CONTENT);
    let changed = false;
    Object.keys(DEFAULT_CONTENT).forEach(k=>{ if(!(k in c)){ c[k]=DEFAULT_CONTENT[k]; changed=true; } });
    if(changed) lsSet(LS_KEYS.content, c);
    if(lsGet(LS_KEYS.feed, null)===null) lsSet(LS_KEYS.feed, DEFAULT_FEED_POSTS);
    if(lsGet(LS_KEYS.services, null)===null) lsSet(LS_KEYS.services, DEFAULT_SERVICES);
  }
}

/* ---------------- HELPERS ---------------- */
function $(sel, root){ return (root||document).querySelector(sel); }
function $all(sel, root){ return Array.from((root||document).querySelectorAll(sel)); }
function escapeHtml(str){ return String(str||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function currentCurrency(){ return lsGet(LS_KEYS.currency, DB.content.displayCurrency || 'NGN'); }
function setCurrency(code){ lsSet(LS_KEYS.currency, code); render(); }
function fmtPrice(usdAmount){
  const c = DB.content;
  const code = currentCurrency();
  const rate = (c.exchangeRates && c.exchangeRates[code]) || 1;
  const symbol = (c.currencySymbols && c.currencySymbols[code]) || code+' ';
  const converted = Number(usdAmount) * rate;
  // Whole-number currencies (e.g. Naira) read oddly with decimals for small demo prices,
  // but we keep 2dp for anything under 100 units so cheap items don't round to 0/1.
  const decimals = converted >= 100 ? 0 : 2;
  return symbol + converted.toLocaleString(undefined,{minimumFractionDigits:decimals,maximumFractionDigits:decimals});
}
async function tryRefreshExchangeRates(){
  const c = DB.content;
  const last = c.ratesUpdatedAt ? new Date(c.ratesUpdatedAt) : null;
  const dayMs = 24*60*60*1000;
  if(last && (Date.now()-last.getTime()) < dayMs) return; // at most once/day, saves data
  if(!navigator.onLine) return;
  try{
    const res = await fetch('https://open.er-api.com/v6/latest/USD');
    if(!res.ok) return;
    const data = await res.json();
    if(data && data.result==='success' && data.rates){
      const keep = Object.keys(c.exchangeRates);
      const updated = {...c.exchangeRates};
      keep.forEach(code=>{ if(data.rates[code]) updated[code] = data.rates[code]; });
      DB.content = {...c, exchangeRates:updated, ratesUpdatedAt:new Date().toISOString()};
      logActivity('System', 'Auto-updated currency exchange rates');
      render();
    }
  }catch(e){ /* offline or blocked — admin-set rates keep working */ }
}
function starString(rating){
  const full = Math.round(rating);
  return '★★★★★☆☆☆☆☆'.slice(5-full, 10-full) + ' ' + rating.toFixed(1);
}
function toast(msg, type){
  const stack = $('#toast-stack');
  const el = document.createElement('div');
  el.className = 'toast ' + (type||'');
  el.textContent = msg;
  stack.appendChild(el);
  setTimeout(()=>{ el.style.transition='opacity .3s'; el.style.opacity='0'; setTimeout(()=>el.remove(),300); }, 2600);
}
function navigate(hash){ if(location.hash === hash){ render(); } else { location.hash = hash; } }
function isWished(id){ return DB.wishlist.includes(id); }
function toggleWish(id){
  let wl = DB.wishlist;
  if(wl.includes(id)){ wl = wl.filter(x=>x!==id); toast('Removed from wishlist'); }
  else { wl = [...wl, id]; toast('Added to wishlist ❤️','success'); }
  DB.wishlist = wl;
  syncWishIcons();
}
function syncWishIcons(){
  $all('[data-wish-id]').forEach(btn=>{
    const id = btn.getAttribute('data-wish-id');
    btn.classList.toggle('active', isWished(id));
    btn.textContent = isWished(id) ? '❤️' : '🤍';
  });
  const navHeart = $('.nav-item[href="#wishlist"] .nav-count');
  if(navHeart) navHeart.textContent = DB.wishlist.length || '';
}
function findProduct(id){ return DB.products.find(p=>p.id===id); }
function applyTheme(){

/* ---------------- ROUTER ---------------- */
const ROUTES = ['#home','#products','#service','#wishlist','#profile','#menu'];
function currentRoute(){ return location.hash || '#home'; }

window.addEventListener('hashchange', render);
// NOTE: layout adapts purely via CSS media queries, so a full re-render on
// resize is never needed and was the cause of the keyboard closing / the
// app appearing to "refresh itself" whenever the on-screen keyboard opened
// (which fires a resize event) or the address bar hid/showed on scroll.
// We only need to (re)spawn the desktop ambient particles on resize.
window.addEventListener('resize', debounce(spawnParticles, 250));
function debounce(fn, ms){ let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a),ms); }; }

function render(){
  const hash = currentRoute();
  appState.route = hash;
  const app = $('#app');
  window.scrollTo({top:0, behavior:'auto'});

  if(hash === '#admin'){ renderAdmin(); return; }

  let body = '';
  if(hash.startsWith('#product/')){
    body = screenProductDetail(hash.split('/')[1]);
  } else if(hash.startsWith('#feed/')){
    body = screenFeedDetail(hash.split('/')[1]);
  } else if(hash === '#products'){
    body = screenProducts();
  } else if(hash === '#service'){
    body = screenService();
  } else if(hash === '#wishlist'){
    body = screenWishlist();
  } else if(hash === '#profile'){
    body = screenProfile();
  } else if(hash === '#menu'){
    body = screenMenu();
  } else {
    body = screenHome();
  }

  app.innerHTML = shellHeader() + body + shellBottomNav() + '<div class="status-fill" style="display:none"></div>';
  afterRender(hash);
}

/* ---------------- PRODUCTS (catalog) ---------------- */
function filteredProducts(){
  const f = appState.productFilters;
  let list = DB.products.filter(p=>p.status!=='draft');
  if(f.category !== 'all') list = list.filter(p=>p.category===f.category);
  if(f.price==='u10') list = list.filter(p=>(p.salePrice||p.price) < 10);
  if(f.price==='10-50') list = list.filter(p=>{ const pr=p.salePrice||p.price; return pr>=10 && pr<=50; });
  if(f.price==='50p') list = list.filter(p=>(p.salePrice||p.price) > 50);
  if(f.q) list = list.filter(p=>(p.name+' '+p.description+' '+(p.tags||[]).join(' ')).toLowerCase().includes(f.q.toLowerCase()));
  if(f.sort==='popular') list = list.sort((a,b)=>b.reviewCount-a.reviewCount);
  if(f.sort==='newest') list = list.slice().reverse();
  if(f.sort==='cheap') list = list.sort((a,b)=>(a.salePrice||a.price)-(b.salePrice||b.price));
  if(f.sort==='rated') list = list.sort((a,b)=>b.rating-a.rating);
  return list;
}

function normalizeMedia(item){
  if(!item) return null;
  if(typeof item === 'object' && item.url) return {url:item.url, type:item.type||guessMediaType(item.url)};
  return {url:item, type:guessMediaType(item)};
}
function guessMediaType(url){
  return /\.(mp4|webm|mov|m4v|ogg)(\?|#|$)/i.test(url||'') ? 'video' : 'image';
}
function productMedia(p){
  return (p.gallery||[]).map(normalizeMedia).filter(Boolean).slice(0,8);
}

function submitReview(){

/* ---------------- WISHLIST ---------------- */
function wishlistProducts(){
  const ids = DB.wishlist;
  let list = DB.products.filter(p=>ids.includes(p.id));
  const s = appState.wishlistSort;
  if(s==='price-low') list = list.sort((a,b)=>(a.salePrice||a.price)-(b.salePrice||b.price));
  if(s==='price-high') list = list.sort((a,b)=>(b.salePrice||b.price)-(a.salePrice||a.price));
  if(s==='rating') list = list.sort((a,b)=>b.rating-a.rating);
  return list;
}
function screenWishlist(){
  const list = wishlistProducts();
  return `
  <div class="screen">
    <div class="flex" style="justify-content:space-between;align-items:center;">
      <h1 class="screen-title">Saved Items</h1>
      <select class="select-pill" onchange="appState.wishlistSort=this.value; rerenderWishlist();">
        <option value="newest">Newest</option>
        <option value="price-low">Price: low → high</option>
        <option value="price-high">Price: high → low</option>
        <option value="rating">Rating</option>
      </select>
    </div>
    <div id="wishlistWrap">${wishlistListOrEmpty(list)}</div>
    ${list.length?`
    <div class="flex gap-8 mt-16" style="flex-wrap:wrap;">
      <button class="btn btn-outline btn-sm" onclick="exportWishlist()">💾 Save all to file</button>

}
function wishlistListOrEmpty(list){
  if(!list.length){
    return `<div class="empty-state"><div class="ic">💔</div><h3>No saved items yet</h3><p>Tap the heart on any product to save it here.</p><button class="btn btn-primary" onclick="navigate('#products')">Browse Products</button></div>`;
  }
  return `<div class="grid-products">${list.map(p=>productCard(p)).join('')}</div>`;
}
function rerenderWishlist(){ const w=$('#wishlistWrap'); if(w) w.innerHTML = wishlistListOrEmpty(wishlistProducts()); }
function exportWishlist(){
  const data = JSON.stringify(wishlistProducts(), null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = 'lexden-nova-wishlist.json'; a.click();
  toast('Wishlist exported','success');
}
function shareWishlist(){
  const ids = DB.wishlist.join(',');
  const url = location.origin + location.pathname + '#wishlist?ids=' + ids;

function clearWishlist(){
  if(!confirm('Remove all items from your wishlist?')) return;
  DB.wishlist = [];
  toast('Wishlist cleared');

}

let pressTimer = null;
function afterRender(hash){
  syncWishIcons();
  $all('.logo-press').forEach(logo=>{
    const start = ()=>{ logo.style.transition='filter .3s, transform .3s'; logo.style.filter='drop-shadow(0 0 8px var(--accent))'; pressTimer = setTimeout(()=>{ if(navigator.vibrate) navigator.vibrate(120); navigate('#admin'); }, 1500); };
    const cancel = ()=>{ clearTimeout(pressTimer); logo.style.filter=''; };
    logo.addEventListener('mousedown', start); logo.addEventListener('touchstart', start, {passive:true});

  ensureNovaWidget();

}
function setupBackToTop(){
  let bt = $('#backTop');

    bt.onclick = ()=>window.scrollTo({top:0,behavior:'smooth'});
    document.body.appendChild(bt);
  }
  window.onscroll = debounce(()=>{ bt.classList.toggle('show', window.scrollY>400); }, 80);
}

function saveProduct(id){
  const name = $('#f_name').value.trim();
  const price = parseFloat($('#f_price').value);
  if(!name || isNaN(price)){ toast('Name and price are required','error'); return; }
  const list = DB.products;
  const mediaUrls = Array.from({length:8}).map((_,i)=>$('#f_media'+i)?.value.trim()).filter(Boolean);
  const gallery = mediaUrls.map(url=>({url, type:guessMediaType(url)}));
  const coverImage = (gallery[0] && gallery[0].type==='image') ? gallery[0].url
    : (gallery.find(g=>g.type==='image')||{}).url || 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=600&q=80';
  const data = {
    name, category:$('#f_category').value, price,
    salePrice: $('#f_salePrice').value? parseFloat($('#f_salePrice').value) : null,
    itemCode:$('#f_itemCode').value, seller:$('#f_seller').value,
    image: coverImage,
    gallery: gallery.length?gallery:[{url:coverImage,type:'image'}], affiliateLink:$('#f_link').value || '#',
    status:$('#f_status').value, tags:$('#f_tags').value.split(',').map(t=>t.trim()).filter(Boolean),
    description:$('#f_desc').value, specs:(id&&findProduct(id)?.specs)||{}, rating:(id&&findProduct(id)?.rating)||4.5,
    reviewCount:(id&&findProduct(id)?.reviewCount)||0, featured:(id&&findProduct(id)?.featured)||false, trending:(id&&findProduct(id)?.trending)||false,
  };
  if(id){
    const idx = list.findIndex(p=>p.id===id);
    list[idx] = {...list[idx], ...data};
    logActivity('Admin', `Edited product "${name}"`);
  } else {
    data.id = 'p'+Date.now();
    list.push(data);
    logActivity('Admin', `Added product "${name}"`);
  }
  DB.products = list;
  toast('Product saved','success');
  $('#productFormWrap').innerHTML='';
  renderAdminTab();
}
function deleteProduct(id){
  const p = findProduct(id);
  if(!confirm(`Delete "${p?.name}"? This cannot be undone.`)) return;
  DB.products = DB.products.filter(x=>x.id!==id);
  DB.wishlist = DB.wishlist.filter(x=>x!==id);
  logActivity('Admin', `Deleted product "${p?.name}"`);
  toast('Product deleted');
  renderAdminTab();
}

}
function openFeedForm(id){

  </div>`;

function saveFeedPost(id){
  const title = $('#fp_title').value.trim();
  if(!title){ toast('Title is required','error'); return; }
  const list = DB.feed;
  const media = Array.from({length:8}).map((_,i)=>$('#fp_media'+i)?.value.trim()).filter(Boolean).map(url=>({url, type:guessMediaType(url)}));
  const productId = $('#fp_product').value || null;
  const data = {title, body:$('#fp_body').value.trim(), media, productId, date:(id&&list.find(p=>p.id===id)?.date)||new Date().toISOString().slice(0,10)};
  if(id){ const idx = list.findIndex(p=>p.id===id); list[idx] = {...list[idx], ...data}; }
  else { list.unshift({id:'fp'+Date.now(), ...data}); }
  DB.feed = list;
  logActivity('Admin', `Saved feed post "${title}"`);
  toast('Feed post saved','success');
  $('#feedFormWrap').innerHTML='';
  renderAdminTab();
}
function deleteFeedPost(id){
  if(!confirm('Delete this feed post?')) return;
  DB.feed = DB.feed.filter(p=>p.id!==id);
  renderAdminTab();
}

function exportAppState(){
  const snapshot = {
    products:DB.products, categories:DB.categories, testimonials:DB.testimonials,
    faqs:DB.faqs, content:DB.content, feed:DB.feed, services:DB.services, exportedAt:new Date().toISOString(),
  };
  const blob = new Blob([JSON.stringify(snapshot,null,2)], {type:'application/json'});

function importAppState(){
  const file = $('#importFile').files[0];
  if(!file){ toast('Choose a file first','error'); return; }
  const reader = new FileReader();
  reader.onload = e=>{
    try{
      const data = JSON.parse(e.target.result);
      if(data.products) DB.products = data.products;
      if(data.categories) DB.categories = data.categories;
      if(data.testimonials) DB.testimonials = data.testimonials;
      if(data.faqs) DB.faqs = data.faqs;
      if(data.content) DB.content = data.content;
      if(data.feed) DB.feed = data.feed;
      if(data.services) DB.services = data.services;
      logActivity('Admin', 'Imported app data from file');
      toast('Data imported successfully','success');
      renderAdminTab();
    }catch(err){ toast('Invalid file','error'); }

}

/* =========================================================
   NOVA AI ASSISTANT
   Default mode: fully local — a rules + catalog-grounded
   response engine that reads live product/FAQ/content data
   and composes multi-paragraph answers. No network call, so
   it works instantly on GitHub Pages with zero backend.

   OPTIONAL live-Claude mode: see callRealNovaAPI() below.
   Calling api.anthropic.com directly from a public static
   site would require embedding a secret API key in client-side
   JS, which anyone could read from "view source" — so it's
   left OFF by default. If you want real Claude-powered
   answers, point NOVA_API_ENDPOINT at your own small backend
   (e.g. a Cloudflare Worker / Vercel function) that holds the
   key server-side and forwards the request, then set
   NOVA_MODE = 'api'.
   ========================================================= */
const NOVA_MODE = 'local'; // 'local' or 'api'
const NOVA_API_ENDPOINT = ''; // e.g. 'https://your-worker.example.workers.dev/nova'

function ensureNovaWidget(){
  if($('#novaFab')) { syncNovaBadge(); return; }
  const fab = document.createElement('button');
  fab.id='novaFab'; fab.className='nova-fab'; fab.setAttribute('aria-label','Open NOVA AI assistant'); fab.innerHTML='✨<span class="fab-label">Ask NOVA</span>';
  fab.onclick = ()=>toggleNova(true);
  document.body.appendChild(fab);

  const panel = document.createElement('div');
  panel.id='novaPanel'; panel.className='nova-panel';
  panel.innerHTML = `
    <div class="nova-head">
      <div class="who"><div class="avatar-ai">✨</div><div><div style="font-weight:700;font-size:14px;">NOVA AI</div><div class="small text-2">Here to help you choose</div></div></div>
      <div class="flex gap-8">
        <button class="icon-btn btn-sm" title="Clear history" onclick="clearNovaHistory()">🗑️</button>
        <button class="icon-btn" onclick="toggleNova(false)">✕</button>
      </div>
    </div>
    <div class="nova-body" id="novaBody"></div>
    <div class="quick-replies" id="novaQuick"></div>
    <div class="nova-input-row">
      <input id="novaInput" placeholder="Ask NOVA anything..." onkeydown="if(event.key==='Enter') sendNovaMessage();">
      <button class="nova-send" onclick="sendNovaMessage()" aria-label="Send">➤</button>
    </div>`;
  document.body.appendChild(panel);
  renderNovaHistory();
}
function syncNovaBadge(){}
function toggleNova(open){
  appState.novaOpen = open;
  const panel = $('#novaPanel');
  if(!panel) return;
  panel.classList.toggle('open', open);
  if(open){ renderNovaHistory(); setTimeout(()=>$('#novaInput')?.focus(), 200); }
}
function novaHistory(){ return lsGet(LS_KEYS.novaHistory, []); }
function saveNovaHistory(h){ lsSet(LS_KEYS.novaHistory, h.slice(-40)); }
function clearNovaHistory(){ saveNovaHistory([]); renderNovaHistory(); toast('Chat history cleared'); }

function renderNovaHistory(){
  const body = $('#novaBody');
  if(!body) return;
  let hist = novaHistory();
  if(!hist.length){
    hist = [{role:'ai', html: welcomeMessage()}];
  }
  body.innerHTML = hist.map(m=>`<div class="msg ${m.role==='user'?'user':'ai'}">${m.role==='user'?escapeHtml(m.text):m.html}</div>`).join('');
  body.scrollTop = body.scrollHeight;
  renderQuickReplies();
}
function welcomeMessage(){
  return `Hi! I'm <strong>NOVA</strong>, your shopping assistant for LEXDEN NOVA. I can recommend products, compare prices, explain how checkout works, or answer questions about anything you're browsing right now. What are you looking for today?`;
}
const NOVA_SUGGESTIONS = ['Cheapest products?','Recommend something for me','How do I buy?','Contact support'];
function renderQuickReplies(){
  const q = $('#novaQuick'); if(!q) return;
  q.innerHTML = NOVA_SUGGESTIONS.map((s,i)=>`<button class="chip" onclick="quickNovaByIndex(${i})">${escapeHtml(s)}</button>`).join('');
}
function quickNovaByIndex(i){ $('#novaInput').value = NOVA_SUGGESTIONS[i]; sendNovaMessage(); }
function openNova(prefill){ toggleNova(true); if(prefill){ setTimeout(()=>{ $('#novaInput').value = prefill; sendNovaMessage(); }, 250); } }

async function sendNovaMessage(){
  const input = $('#novaInput');
  const text = input.value.trim();
  if(!text) return;
  input.value = '';
  const hist = novaHistory();
  hist.push({role:'user', text});
  saveNovaHistory(hist);
  renderNovaHistory();

  const body = $('#novaBody');
  const typingEl = document.createElement('div');
  typingEl.className = 'typing-dots'; typingEl.innerHTML = '<span></span><span></span><span></span>';
  body.appendChild(typingEl); body.scrollTop = body.scrollHeight;

  let responseHtml;
  try{
    responseHtml = NOVA_MODE === 'api' && NOVA_API_ENDPOINT ? await callRealNovaAPI(text) : generateNovaResponse(text);
  }catch(err){
    responseHtml = `I ran into a problem reaching my full brain just now, so here's what I can tell you locally: ${generateNovaResponse(text)}`;
  }
  await new Promise(r=>setTimeout(r, 450 + Math.random()*400));
  typingEl.remove();

  const hist2 = novaHistory();
  hist2.push({role:'ai', html: responseHtml});
  saveNovaHistory(hist2);
  renderNovaHistory();
}

/* Optional real-API bridge (see notes above). Left inactive unless
   NOVA_MODE is switched to 'api' and an endpoint is configured. */
async function callRealNovaAPI(userText){
  const context = buildNovaContext();
  const res = await fetch(NOVA_API_ENDPOINT, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ message:userText, context })
  });
  const data = await res.json();
  return data.html || escapeHtml(data.text||'Sorry, I could not generate a response.');
}
function buildNovaContext(){
  return {
    route: appState.route,
    products: DB.products.map(p=>({id:p.id,name:p.name,category:p.category,price:p.price,salePrice:p.salePrice,rating:p.rating})),
    faqs: DB.faqs, content: DB.content,
  };
}

/* ---------- LOCAL RESPONSE ENGINE (grounded, multi-paragraph) ---------- */
function pLink(p){ return `<a href="#product/${p.id}" onclick="toggleNova(false)">${escapeHtml(p.name)}</a>`; }
function moneyStr(p){ return p.salePrice? `${fmtPrice(p.salePrice)} (down from ${fmtPrice(p.price)})` : fmtPrice(p.price); }

function generateNovaResponse(raw){
  const text = raw.toLowerCase();
  const c = DB.content;
  const products = DB.products.filter(p=>p.status!=='published' ? p.status!=='draft' : true).filter(p=>p.status!=='draft');
  const currentProduct = appState.route.startsWith('#product/') ? findProduct(appState.route.split('/')[1]) : null;

  // 1) Greetings
  if(/^(hi|hey|hello|yo|sup|good (morning|afternoon|evening))\b/.test(text.trim())){
    const p1 = `Hey there! Good to have you here. I'm NOVA, and I know the entire LEXDEN NOVA catalog — every course, template, software pick and bundle, along with prices, ratings and reviews — so you can ask me anything instead of digging through menus.`;
    const p2 = currentProduct
      ? `I can see you're currently looking at ${pLink(currentProduct)}, priced at ${moneyStr(currentProduct)} with a ${currentProduct.rating}★ rating from ${currentProduct.reviewCount} reviewers. Want me to break down whether it's worth it, or compare it with something similar?`
      : `Right now we have ${products.length} products live across ${DB.categories.length-1} categories, ranging from quick eBooks under $10 to full course bundles. If you tell me your budget or what you're trying to achieve (grow a page, learn a skill, start freelancing), I'll point you to the best fit.`;
    const p3 = `You can also ask me things like "what's the cheapest course", "how do I buy something", or "compare product X and Y" — I'll always answer with real prices and links, not generic filler.`;
    return [p1,p2,p3].map(t=>`<p style="margin:0 0 8px;">${t}</p>`).join('');
  }

  // 2) Contact / support
  if(/(contact|support|whatsapp|email|reach you|talk to (a )?human)/.test(text)){
    const p1 = `You've got a few ways to reach the LEXDEN NOVA team directly. WhatsApp is usually fastest — message ${escapeHtml(c.whatsappDisplay)} (username ${escapeHtml(c.whatsappUsername)}) and someone typically replies within a few hours.`;
    const p2 = `For anything that needs a paper trail — like a purchase issue with a specific partner product — email works well too: ${escapeHtml(c.contactEmail)}. Include the product name and item code (shown on every product page) so support can look it up fast.`;
    const p3 = `We're also active on Instagram (${escapeHtml(c.instagram)}), TikTok (${escapeHtml(c.tiktok)}), YouTube (${escapeHtml(c.youtube)}) and Facebook (${escapeHtml(c.facebook)}) if you'd rather DM there or just want to see more product breakdowns.`;
    return [p1,p2,p3].map(t=>`<p style="margin:0 0 8px;">${t}</p>`).join('');
  }

  // 3) How to buy / purchase flow
  if(/(how (do|to) i (buy|purchase|checkout|order)|how does (buying|checkout) work|how to pay)/.test(text)){
    const p1 = `Buying through LEXDEN NOVA is simple because we don't handle payment ourselves — we connect you straight to the partner selling the product, so there's no extra account to create on our end.`;
    const p2 = `Step by step: browse or search the Products tab, open a product you like, and scroll to the sticky "${escapeHtml(c.buyButtonText)}" button at the bottom of its page. Tapping it opens the seller's own secure checkout in a new tab, where you'll enter payment details directly with them.`;
    const p3 = `After payment, access is granted by that seller — usually instantly by email or download link, though timing depends on the individual partner, not on us. If anything goes wrong at checkout, the seller info block on the product page tells you who to contact.`;
    const p4 = currentProduct ? `Since you're on ${pLink(currentProduct)} right now, you can try that flow immediately — it's ${moneyStr(currentProduct)}.` : `Want me to point you to a specific product to try this with?`;
    return [p1,p2,p3,p4].map(t=>`<p style="margin:0 0 8px;">${t}</p>`).join('');
  }

  // 4) Refund / policy / FAQ keyword match
  const faqHit = DB.faqs.find(f=> text.split(/\s+/).some(w=>w.length>3 && f.q.toLowerCase().includes(w)) );
  if(faqHit || /(refund|policy|guarantee|cancel)/.test(text)){
    const f = faqHit || DB.faqs.find(f=>/refund/i.test(f.q));
    const p1 = f ? `Good question — here's the honest answer: ${escapeHtml(f.a)}` : `Refund and cancellation terms are set individually by each partner seller, since LEXDEN NOVA is a showcase and affiliate platform rather than the merchant of record.`;
    const p2 = `Because every product comes from a different partner, policies can vary — some offer 7 or 14-day guarantees, others are final-sale for instant-download items. The safest move is to check the "About the seller" section on the product page before buying, or ask me about a specific product and I'll tell you what's listed.`;
    const p3 = `If a purchase ever goes wrong, reach out on WhatsApp (${escapeHtml(c.whatsappDisplay)}) with the item code and we'll help you get in touch with the right seller.`;
    return [p1,p2,p3].map(t=>`<p style="margin:0 0 8px;">${t}</p>`).join('');
  }

  // 5) Cheapest / budget
  if(/(cheap|budget|lowest price|affordable|under \$?\d+)/.test(text)){
    const sorted = products.slice().sort((a,b)=>(a.salePrice||a.price)-(b.salePrice||b.price)).slice(0,4);
    const p1 = `If price is the priority, here's what's currently cheapest in the catalog, from lowest up:`;
    const list = sorted.map((p,i)=>`${i+1}. ${pLink(p)} — ${moneyStr(p)}, rated ${p.rating}★`).join('<br>');
    const p2 = `${sorted[0] ? `${pLink(sorted[0])} is the best deal right now at ${moneyStr(sorted[0])}` : ''}${sorted[0] && sorted[0].rating>=4.5 ? `, and it's also well-reviewed — not just cheap for the sake of it.` : `.`}`;
    const p3 = `If you tell me what category you actually need (courses, templates, software, or bundles), I can narrow this down further instead of just sorting by price.`;
    return [`<p style="margin:0 0 8px;">${p1}</p>`, `<p style="margin:0 0 8px;">${list}</p>`, `<p style="margin:0 0 8px;">${p2}</p>`, `<p style="margin:0;">${p3}</p>`].join('');
  }

  // 6) Compare two products
  if(/(compare|vs\.?|versus|which is (better|cheaper|worth it))/.test(text)){
    const matches = products.filter(p=> text.includes(p.name.toLowerCase()) || (p.tags||[]).some(t=>text.includes(t.toLowerCase())) );
    if(matches.length>=2){
      const [a,b] = matches;
      const p1 = `Comparing ${pLink(a)} and ${pLink(b)}: on price, ${a.salePrice||a.price < (b.salePrice||b.price) ? pLink(a) : pLink(b)} is the more budget-friendly option at ${moneyStr((a.salePrice||a.price)<(b.salePrice||b.price)?a:b)}.`;
      const p2 = `On ratings, ${a.rating>=b.rating?pLink(a):pLink(b)} edges ahead at ${Math.max(a.rating,b.rating)}★ versus ${Math.min(a.rating,b.rating)}★, based on ${a.rating>=b.rating?a.reviewCount:b.reviewCount} reviews.`;
      const p3 = `They're also aimed at slightly different things — ${escapeHtml(a.name)} is a ${a.category} focused on "${(a.tags||[])[0]||a.category}", while ${escapeHtml(b.name)} leans more into "${(b.tags||[])[0]||b.category}". If budget matters more, go with the cheaper one; if you want the strongest track record, go with the higher-rated one.`;
      return [p1,p2,p3].map(t=>`<p style="margin:0 0 8px;">${t}</p>`).join('');
    }
    if(currentProduct){
      const related = products.filter(p=>p.category===currentProduct.category && p.id!==currentProduct.id).sort((a,b)=>b.rating-a.rating)[0];
      if(related){
        const p1 = `Since you're viewing ${pLink(currentProduct)}, the closest comparison in the catalog is ${pLink(related)} — both are in ${currentProduct.category}.`;
        const p2 = `${pLink(currentProduct)} is ${moneyStr(currentProduct)} at ${currentProduct.rating}★, while ${pLink(related)} is ${moneyStr(related)} at ${related.rating}★. ${currentProduct.rating>=related.rating? 'The one you\'re looking at currently has the edge in reviews.' : 'The alternative actually has a stronger review record, so it might be worth a look too.'}`;
        const p3 = `Tell me your priority — price, rating, or specific features — and I'll give you a clearer recommendation between the two.`;
        return [p1,p2,p3].map(t=>`<p style="margin:0 0 8px;">${t}</p>`).join('');
      }
    }
  }

  // 7) Question about "this" product on current product page
  if(currentProduct && /(this|it|worth it|good|price|detail|feature|review)/.test(text)){
    const hasSale = currentProduct.salePrice && currentProduct.salePrice < currentProduct.price;
    const p1 = `${escapeHtml(currentProduct.name)} is ${escapeHtml(currentProduct.description)}`;
    const p2 = `It's priced at ${fmtPrice(hasSale?currentProduct.salePrice:currentProduct.price)}${hasSale?` (marked down from ${fmtPrice(currentProduct.price)})`:''}, and currently holds a ${currentProduct.rating}★ average across ${currentProduct.reviewCount} reviews — ${currentProduct.rating>=4.6?'one of the stronger ratings in the catalog.':currentProduct.rating>=4.3?'a solid, dependable rating.':'a decent rating, worth reading a couple of reviews before deciding.'}`;
    const specEntries = Object.entries(currentProduct.specs||{});
    const p3 = specEntries.length ? `Key specifics: ${specEntries.map(([k,v])=>`${k} — ${v}`).join('; ')}. It's sold by ${escapeHtml(currentProduct.seller||'a Lexden partner')}.` : `It's sold by ${escapeHtml(currentProduct.seller||'a Lexden partner')}.`;
    const p4 = `If it looks like a fit, the "${escapeHtml(c.buyButtonText)}" button at the bottom of this page takes you straight to checkout. Want me to suggest something similar to compare it against first?`;
    return [p1,p2,p3,p4].map(t=>`<p style="margin:0 0 8px;">${t}</p>`).join('');
  }

  // 8) Category / keyword driven recommendation
  const catHit = DB.categories.find(c2=>c2.id!=='all' && text.includes(c2.name.toLowerCase()));
  const tagHit = products.filter(p=>(p.tags||[]).some(t=>text.includes(t.toLowerCase())));
  if(catHit || tagHit.length || /(recommend|suggest|best|looking for|need something|help me (find|choose))/.test(text)){
    let pool = catHit ? products.filter(p=>p.category===catHit.id) : (tagHit.length? tagHit : products.filter(p=>p.featured || p.trending));
    pool = pool.sort((a,b)=>b.rating-a.rating).slice(0,3);
    if(pool.length){
      const p1 = catHit ? `Here's what I'd point you to in ${escapeHtml(catHit.name)}, ranked by rating:` : `Based on what you're asking, here are a few strong picks from the catalog:`;
      const list = pool.map((p,i)=>`${i+1}. ${pLink(p)} — ${moneyStr(p)}, ${p.rating}★ (${p.reviewCount} reviews)`).join('<br>');
      const top = pool[0];
      const p2 = `${pLink(top)} stands out most — it's rated ${top.rating}★ and ${top.salePrice?`currently discounted to ${fmtPrice(top.salePrice)}`:`priced at ${fmtPrice(top.price)}`}. ${top.description.split('.')[0]}.`;
      const p3 = `If none of these quite match what you had in mind, tell me more about your goal (e.g. "I want to learn video editing" or "something under $10") and I'll refine the list.`;
      return [`<p style="margin:0 0 8px;">${p1}</p>`,`<p style="margin:0 0 8px;">${list}</p>`,`<p style="margin:0 0 8px;">${p2}</p>`,`<p style="margin:0;">${p3}</p>`].join('');
    }
  }

  // 9) Navigation help
  if(/(where (is|can i find)|how do i get to|navigate|wishlist screen|admin|menu screen)/.test(text)){
    const p1 = `Here's a quick map of the app: <strong>Home</strong> has featured and trending picks, <strong>Products</strong> is the full searchable catalog with filters, <strong>Wishlist</strong> holds everything you've hearted, <strong>Profile</strong> has your settings, and <strong>Menu</strong> has company info, support links and legal pages.`;
    const p2 = `All five are reachable from the bar at the bottom of the screen on mobile, or the top navigation bar on larger screens — tapping any icon takes you straight there with no reload.`;
    const p3 = `If you were looking for something specific, tell me what it was and I can usually just answer it directly instead of you having to click around.`;
    return [p1,p2,p3].map(t=>`<p style="margin:0 0 8px;">${t}</p>`).join('');
  }

  // 10) Fallback — general, still catalog-grounded and multi-paragraph
  const sample = products.slice().sort((a,b)=>b.rating-a.rating).slice(0,3);
  const p1 = `I want to give you a genuinely useful answer rather than a generic one, so let me work with what I know: LEXDEN NOVA currently lists ${products.length} products across ${DB.categories.length-1} categories (${DB.categories.filter(c2=>c2.id!=='all').map(c2=>c2.name).join(', ')}).`;
  const p2 = `A few of the best-reviewed picks right now are ${sample.map(p=>pLink(p)).join(', ')} — all ${sample[sample.length-1]?.rating}★ or higher.`;
  const p3 = `I can recommend products by budget or category, compare two items, explain checkout, or share contact details — just phrase it naturally, e.g. "cheapest templates" or "is the freelance bundle worth it".`;
  const p4 = `What would help most right now?`;
  return [p1,p2,p3,p4].map(t=>`<p style="margin:0 0 8px;">${t}</p>`).join('');
}

/* ---------------- DESKTOP AMBIENT PARTICLES ---------------- */
function spawnParticles(){
  if(window.innerWidth < 1024){ $all('.particle').forEach(el=>el.remove()); return; }
  if($('.particle')) return;
  for(let i=0;i<14;i++){
    const el = document.createElement('div');
    el.className='particle';
    const size = 3+Math.random()*5;
    el.style.width = el.style.height = size+'px';
    el.style.left = Math.random()*100+'vw';
    el.style.top = Math.random()*100+'vh';
    el.style.background = i%2? 'var(--accent)' : 'var(--accent-2)';
    el.style.animation = `novaFloat ${4+Math.random()*4}s ease-in-out infinite`;
    el.style.animationDelay = (Math.random()*3)+'s';
    document.body.appendChild(el);
  }
}

/* ---------------- INIT ---------------- */
function init(){
  seedIfNeeded();
  applyTheme();
  if(!location.hash) location.hash = '#home';
  render();
  spawnParticles();
  tryRefreshExchangeRates();
  document.addEventListener('keydown', e=>{ if(e.key==='Escape' && appState.novaOpen) toggleNova(false); });
  // Basic global error guard so a single bad render doesn't blank the app
  window.addEventListener('error', e=>{ console.error('LEXDEN NOVA error:', e.error||e.message); });
}
init();
</script>
