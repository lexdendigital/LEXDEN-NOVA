<script>
(() => {
  'use strict';

  /* ================= Default State (kept in sync with index.html) ================= */
  // === DEFAULT_STATE_START ===
  const DEFAULT_STATE = {
    logo: { type: 'text', text: 'LEXDEN NOVA', imageUrl: '', svg: '' },
    social: {
      twitter: 'https://twitter.com/lexdendigital',
      instagram: 'https://instagram.com/lexdendigital',
      facebook: 'https://facebook.com/lexdendigital',
      whatsapp: 'https://wa.me/2340000000000'
    },
    security: { passkey: 'Password15' },
    stats: [
      { id: 's1', label: 'Projects Shipped', value: 120, suffix: '+' },
      { id: 's2', label: 'Enterprise Clients', value: 38, suffix: '' },
      { id: 's3', label: 'Countries Served', value: 14, suffix: '' },
      { id: 's4', label: 'Platform Uptime', value: 99.9, suffix: '%' }
    ],
    products: [
      { id: 'LXD-001', name: 'Nova Custom Software Suite', description: 'End-to-end bespoke software built around your workflow, from architecture to deployment.', price: 850000, salePrice: null, image: 'https://images.unsplash.com/photo-1517430816045-df4b7de11d1d?w=800&q=60', images: [], video: '', link: 'https://lexdendigital.com/software', tags: ['software', 'enterprise'] },
      { id: 'LXD-002', name: 'Lexden Mobile App Package', description: 'Native-feel Android and iOS apps designed for low-bandwidth, high-impact markets.', price: 620000, salePrice: 499000, image: 'https://images.unsplash.com/photo-1512941937669-90a1b58e7e9c?w=800&q=60', images: [], video: '', link: 'https://lexdendigital.com/mobile', tags: ['mobile', 'software'] },
      { id: 'LXD-003', name: 'Enterprise AI Integration', description: 'Embed AI copilots and automation directly into your existing enterprise systems.', price: 1450000, salePrice: null, image: 'https://images.unsplash.com/photo-1555255707-c07966088b7b?w=800&q=60', images: [], video: 'https://www.youtube.com/watch?v=jNQXAC9IVRw', link: 'https://lexdendigital.com/ai', tags: ['ai', 'enterprise'] },
      { id: 'LXD-004', name: 'Cybersecurity Infrastructure Audit', description: 'Full-stack security hardening, threat modeling, and infrastructure lockdown.', price: 980000, salePrice: null, image: 'https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=800&q=60', images: [], video: '', link: 'https://lexdendigital.com/security', tags: ['security', 'enterprise'] },
      { id: 'LXD-005', name: 'Lexden Academy: Dev Bootcamp', description: 'Cohort-based training scaling tech talent from zero to deployable engineer.', price: 120000, salePrice: 95000, image: 'https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=800&q=60', images: [], video: '', link: 'https://lexdenacademy.com/bootcamp', tags: ['academy', 'education'] },
      { id: 'LXD-006', name: 'Digital Literacy Micro-Course', description: 'A compact, mobile-first course bringing practical tech fluency to new learners.', price: 15000, salePrice: null, image: 'https://images.unsplash.com/photo-1509062522246-3755977927d7?w=800&q=60', images: [], video: '', link: 'https://lexdenacademy.com/literacy', tags: ['academy', 'education'] }
    ],
    media: [
      { id: 'm1', type: 'youtube', url: 'https://www.youtube.com/watch?v=jNQXAC9IVRw', caption: 'Sample clip — replace with your own footage in Admin → Inventory.', productId: 'LXD-003' },
      { id: 'm2', type: 'image', url: 'https://images.unsplash.com/photo-1461749280684-dccba630e2f6?w=1000&q=60', caption: 'The latest Lexden Academy cohort shipping their first live product.', productId: 'LXD-005' },
      { id: 'm3', type: 'image', url: 'https://images.unsplash.com/photo-1563986768609-322da13575f3?w=1000&q=60', caption: 'A look inside a recent infrastructure lockdown engagement.', productId: 'LXD-004' },
      { id: 'm4', type: 'image', url: 'https://images.unsplash.com/photo-1551650975-87deedd944c3?w=1000&q=60', caption: 'Mobile-first builds, designed for markets running on tight data.', productId: 'LXD-002' }
    ]
  };
  // === DEFAULT_STATE_END ===

  const STORAGE_KEY = 'lexdenNovaState';

  function loadState() {
    let state = JSON.parse(JSON.stringify(DEFAULT_STATE));
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        const parsed = JSON.parse(saved);
        state = {
          ...state,
          ...parsed,
          logo: { ...state.logo, ...(parsed.logo || {}) },
          social: { ...state.social, ...(parsed.social || {}) },
          security: { ...state.security, ...(parsed.security || {}) },
          stats: Array.isArray(parsed.stats) ? parsed.stats : state.stats,
          products: Array.isArray(parsed.products) ? parsed.products : state.products,
          media: Array.isArray(parsed.media) ? parsed.media : state.media
        };
      }
    } catch (e) { console.warn('Lexden Nova: failed to parse saved state', e); }
    return state;
  }
  const appState = loadState();

  /* ================= Utilities (shared logic with index.html) ================= */
  function formatPrice(n) {
    if (n === null || n === undefined || n === '') return '';
    return '\u20a6' + Number(n).toLocaleString('en-NG');
  }
  function getYouTubeId(url) {
    if (!url) return '';
    const m = url.match(/(?:youtu\.be\/|v=|embed\/)([A-Za-z0-9_-]{11})/);
    return m ? m[1] : '';
  }
  function isMp4(url) { return /\.(mp4|webm|ogg)(\?.*)?$/i.test(url || ''); }
  function placeholderDataUri(label) {
    const initials = (label || 'LX').trim().split(/\s+/).map(w => w[0]).join('').slice(0, 2).toUpperCase() || 'LX';
    const svg = '<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300">'
      + '<rect width="100%" height="100%" fill="#0c111a"/>'
      + '<rect x="4" y="4" width="392" height="292" fill="none" stroke="#00d2ff" stroke-opacity="0.35"/>'
      + '<text x="50%" y="52%" font-family="sans-serif" font-size="42" fill="#00d2ff" fill-opacity="0.65" text-anchor="middle" dominant-baseline="middle">' + initials + '</text>'
      + '</svg>';
    return 'data:image/svg+xml;utf8,' + encodeURIComponent(svg);
  }
  function escapeHtml(str) {
    return String(str == null ? '' : str).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }
  function isOnSale(product) {
    return product.salePrice !== null && product.salePrice !== undefined && product.salePrice !== '' && Number(product.salePrice) < Number(product.price);
  }

  /* ================= Brand / Social / Footer ================= */
  function renderLogo() {
    const logo = appState.logo;
    let inner;
    if (logo.type === 'image' && logo.imageUrl) {
      inner = '<img src="' + escapeHtml(logo.imageUrl) + '" alt="Lexden Nova" class="h-8 w-auto" data-fallback-label="Lexden Nova">';
    } else if (logo.type === 'svg' && logo.svg) {
      inner = logo.svg;
    } else {
      inner = '<span class="font-display text-base tracking-wide silver-text">' + escapeHtml(logo.text || 'LEXDEN NOVA') + '</span>';
    }
    const desktop = document.getElementById('brand-desktop');
    const footer = document.getElementById('brand-footer');
    if (desktop) desktop.innerHTML = inner;
    if (footer) footer.innerHTML = inner;
  }
  function renderSocial() {
    const social = appState.social;
    const items = [
      { icon: 'twitter', url: social.twitter, label: 'Twitter / X' },
      { icon: 'instagram', url: social.instagram, label: 'Instagram' },
      { icon: 'facebook', url: social.facebook, label: 'Facebook' },
      { icon: 'message-circle', url: social.whatsapp, label: 'WhatsApp' }
    ].filter(i => i.url);
    const html = items.map(i => '<a href="' + escapeHtml(i.url) + '" target="_blank" rel="noopener" aria-label="' + escapeHtml(i.label) + '" class="text-slate-500 hover:text-cyan-400 transition-colors duration-300"><i data-lucide="' + i.icon + '" class="w-4 h-4" aria-hidden="true"></i></a>').join('');
    const footer = document.getElementById('social-footer');
    if (footer) footer.innerHTML = html;
  }

  /* ================= Self-healing images ================= */
  document.addEventListener('error', (e) => {
    const t = e.target;
    if (t && t.tagName === 'IMG' && !t.dataset.healed) {
      t.dataset.healed = '1';
      t.src = placeholderDataUri(t.getAttribute('data-fallback-label') || t.alt || 'asset');
    }
  }, true);

  /* ================= Related product card ================= */
  function relatedCardHTML(product) {
    const onSale = isOnSale(product);
    const priceHtml = onSale
      ? '<span class="text-slate-500 line-through text-xs mr-2">' + formatPrice(product.price) + '</span><span class="text-cyan-400 font-heading font-semibold text-sm">' + formatPrice(product.salePrice) + '</span>'
      : '<span class="text-slate-100 font-heading font-semibold text-sm">' + formatPrice(product.price) + '</span>';
    return '<a href="product.html?code=' + encodeURIComponent(product.id) + '" class="reveal glass rounded-2xl border border-white/5 hover:border-cyan-400/40 transition-colors duration-300 overflow-hidden flex flex-col">'
      + '<div class="aspect-[4/3] bg-black/40 overflow-hidden"><img src="' + escapeHtml(product.image) + '" alt="' + escapeHtml(product.name) + '" class="w-full h-full object-cover" loading="lazy" data-fallback-label="' + escapeHtml(product.name) + '"></div>'
      + '<div class="p-4"><h3 class="font-heading text-slate-100 font-semibold text-sm mb-2 line-clamp-2">' + escapeHtml(product.name) + '</h3>' + priceHtml + '</div>'
      + '</a>';
  }

  /* ================= Gallery ================= */
  function setMainToImage(url, label) {
    document.getElementById('gallery-main-video').classList.add('hidden');
    document.getElementById('gallery-main-video').innerHTML = '';
    const img = document.getElementById('gallery-main-image');
    img.src = url;
    img.alt = label;
    img.setAttribute('data-fallback-label', label);
    img.dataset.healed = '';
    img.classList.remove('hidden');
  }
  function setMainToVideo(url) {
    document.getElementById('gallery-main-image').classList.add('hidden');
    const videoWrap = document.getElementById('gallery-main-video');
    if (isMp4(url)) {
      videoWrap.innerHTML = '<video src="' + escapeHtml(url) + '" controls class="w-full h-full object-cover" playsinline></video>';
    } else {
      const vid = getYouTubeId(url);
      videoWrap.innerHTML = '<iframe src="https://www.youtube.com/embed/' + vid + '" class="w-full h-full" loading="lazy" allowfullscreen title="Product video"></iframe>';
    }
    videoWrap.classList.remove('hidden');
  }
  function renderGallery(product) {
    const images = [product.image, ...(product.images || [])].filter(Boolean);
    const thumbs = document.getElementById('gallery-thumbs');
    const entries = [];
    images.forEach((url, idx) => entries.push({ type: 'image', url, label: 'View ' + (idx + 1) }));
    if (product.video) entries.push({ type: 'video', url: product.video, label: 'Watch video' });

    if (entries.length === 0) {
      setMainToImage(placeholderDataUri(product.name), product.name);
      thumbs.innerHTML = '';
      return;
    }

    function activate(idx) {
      const entry = entries[idx];
      if (entry.type === 'video') setMainToVideo(entry.url);
      else setMainToImage(entry.url, product.name);
      thumbs.querySelectorAll('[data-thumb]').forEach(el => el.classList.toggle('thumb-active', Number(el.dataset.thumb) === idx));
    }

    thumbs.innerHTML = entries.map((entry, idx) =>
      '<button type="button" data-thumb="' + idx + '" class="shrink-0 w-16 h-16 rounded-lg overflow-hidden border-2 border-white/10 relative" aria-label="' + (entry.type === 'video' ? 'Play product video' : 'Show image ' + (idx + 1)) + '">'
      + (entry.type === 'video'
        ? '<div class="w-full h-full bg-panel flex items-center justify-center"><i data-lucide="play-circle" class="w-6 h-6 text-cyan-400" aria-hidden="true"></i></div>'
        : '<img src="' + escapeHtml(entry.url) + '" alt="" class="w-full h-full object-cover" loading="lazy" data-fallback-label="' + escapeHtml(product.name) + '">')
      + '</button>'
    ).join('');
    thumbs.querySelectorAll('[data-thumb]').forEach(el => el.addEventListener('click', () => activate(Number(el.dataset.thumb))));
    activate(0);
    if (window.lucide) lucide.createIcons();
  }

  /* ================= Structured data (SEO) ================= */
  function injectProductSchema(product) {
    const data = {
      '@context': 'https://schema.org',
      '@type': 'Product',
      name: product.name,
      description: product.description,
      image: [product.image, ...(product.images || [])].filter(Boolean),
      sku: product.id,
      offers: {
        '@type': 'Offer',
        priceCurrency: 'NGN',
        price: isOnSale(product) ? product.salePrice : product.price,
        url: product.link || window.location.href,
        availability: 'https://schema.org/InStock'
      }
    };
    const script = document.createElement('script');
    script.type = 'application/ld+json';
    script.textContent = JSON.stringify(data);
    document.head.appendChild(script);
  }

  /* ================= Reveal on scroll ================= */
  function initReveal() {
    if (!('IntersectionObserver' in window)) {
      document.querySelectorAll('.reveal').forEach(el => el.classList.add('is-visible'));
      return;
    }
    const io = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) { entry.target.classList.add('is-visible'); io.unobserve(entry.target); }
      });
    }, { threshold: 0.2 });
    document.querySelectorAll('.reveal').forEach(el => io.observe(el));
  }

  /* ================= Render product ================= */
  function renderProduct(product) {
    document.getElementById('doc-title').textContent = product.name + ' — Lexden Nova';
    document.getElementById('doc-description').setAttribute('content', product.description.slice(0, 155));
    document.getElementById('og-title').setAttribute('content', product.name + ' — Lexden Nova');
    document.getElementById('og-description').setAttribute('content', product.description.slice(0, 155));
    document.getElementById('og-image').setAttribute('content', product.image || '');

    document.getElementById('crumb-name').textContent = product.name;
    document.getElementById('pd-code').textContent = product.id;
    document.getElementById('pd-name').textContent = product.name;
    document.getElementById('pd-description').textContent = product.description;

    const tagsWrap = document.getElementById('pd-tags');
    tagsWrap.innerHTML = (product.tags || []).map(t => '<span class="text-[11px] font-heading px-3 py-1 rounded-full border border-white/10 text-slate-400">' + escapeHtml(t) + '</span>').join('');

    const priceEl = document.getElementById('pd-price');
    priceEl.innerHTML = isOnSale(product)
      ? '<span class="text-slate-500 line-through text-lg mr-3">' + formatPrice(product.price) + '</span>' + formatPrice(product.salePrice)
      : formatPrice(product.price);

    const linkEl = document.getElementById('pd-link');
    if (product.link) { linkEl.href = product.link; } else { linkEl.classList.add('hidden'); }

    const waEl = document.getElementById('pd-whatsapp');
    if (appState.social.whatsapp) { waEl.href = appState.social.whatsapp; waEl.classList.remove('hidden'); }

    renderGallery(product);
    injectProductSchema(product);

    const related = appState.products
      .filter(p => p.id !== product.id)
      .map(p => ({ p, score: (p.tags || []).filter(t => (product.tags || []).includes(t)).length }))
      .filter(r => r.score > 0)
      .sort((a, b) => b.score - a.score)
      .slice(0, 3)
      .map(r => r.p);
    const relatedFallback = related.length ? related : appState.products.filter(p => p.id !== product.id).slice(0, 3);
    document.getElementById('related-grid').innerHTML = relatedFallback.map(relatedCardHTML).join('');

    document.getElementById('product-detail').classList.remove('hidden');
    initReveal();
  }

  function init() {
    const yearEl = document.getElementById('footer-year');
    if (yearEl) yearEl.textContent = new Date().getFullYear();
    renderLogo();
    renderSocial();

    const code = new URLSearchParams(window.location.search).get('code');
    const product = code ? appState.products.find(p => p.id === code) : null;
    if (product) {
      renderProduct(product);
    } else {
      document.getElementById('not-found').classList.remove('hidden');
    }
    if (window.lucide) lucide.createIcons();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
